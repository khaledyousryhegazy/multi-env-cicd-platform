name: nur_al_quran
services:
  # backend service
  backend:
    build:
      context: ../app/backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - backend.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - all_net

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # frontend service
  frontend:
    build:
      context: ../app/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - all_net

  # database service
  postgres:
    image: postgres:15.18-trixie
    ports:
      - "5432:5432"
    env_file:
      - db.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - all_net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  all_net:
    driver: bridge

volumes:
  postgres-data:
