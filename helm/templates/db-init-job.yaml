apiVersion: batch/v1
kind: Job
metadata:
  name: my-app-init-db
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5

  template:
    spec:
      restartPolicy: OnFailure

      containers:
        - name: db-init

          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: IfNotPresent

          envFrom:
            - secretRef:
                name: secret-myapp
            - configMapRef:
                name: configmap-myapp

          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret-myapp
                  key: DB_PASSWORD

          command:
            - /bin/sh
            - -c
            - |
              echo "[*] Running database schema..."

              psql \
                -h "$DB_HOST" \
                -U "$DB_USER" \
                -d "$DB_NAME" \
                -f db/schema.sql

              echo "[*] Running seed..."

              node db/seed.js
              node db/create-mentor.js "khaled yousry" "khaled@admin.com" "000000" "mentor with egaza in quran hafs from assem"
              echo "[*] Database initialized successfully."
