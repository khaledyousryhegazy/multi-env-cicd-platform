name: Multi environment CI/CD pipeline
on:
  push:
    branches:
      - main
jobs:
  build-and-push-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - run: |
          cd app/frontend && npm i
          cd ../backend && npm i

      - name: Docker Setup
        uses: docker/setup-buildx-action@v4.2.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          audience: sts.amazonaws.com
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::661975751370:role/GitHubActions
          role-session-name: github-actions-session

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push docker FRONTEND image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: multi-cicd-frontend-repo
          IMAGE_TAG: ${{ github.sha }}
        working-directory: app/frontend
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: Build, tag, and push docker BACKEND image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: multi-cicd-backend-repo
          IMAGE_TAG: ${{ github.sha }}
        working-directory: app/backend
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
